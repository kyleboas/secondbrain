name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID || vars.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME || 'cloudflare-memory-mcp' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Validate required Cloudflare configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_D1_DATABASE_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secret or variable: ${missing[*]}" >&2
            echo "Set CLOUDFLARE_API_TOKEN as a secret, and set CLOUDFLARE_ACCOUNT_ID / CLOUDFLARE_D1_DATABASE_ID as repo secrets or variables." >&2
            exit 1
          fi
      - name: Validate Cloudflare token
        shell: bash
        run: |
          set -euo pipefail
          if ! npx wrangler whoami; then
            echo "Cloudflare authentication failed. The token usually needs Workers Scripts:Edit, D1:Edit, Vectorize:Edit, and Account:Read on the target account." >&2
            exit 1
          fi
      - name: Inject D1 database ID into wrangler.jsonc
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'wrangler.jsonc';
          const dbId = process.env.CLOUDFLARE_D1_DATABASE_ID;
          const current = fs.readFileSync(path, 'utf8');
          const next = current.replace(
            /"database_id":\s*"[^"]+"/,
            `"database_id": "${dbId}"`,
          );
          if (current === next) {
            throw new Error('Could not find d1_databases[0].database_id in wrangler.jsonc');
          }
          fs.writeFileSync(path, next);
          NODE
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply "$CLOUDFLARE_D1_DATABASE_NAME" --remote
      - name: Deploy to Cloudflare
        run: npx wrangler deploy
