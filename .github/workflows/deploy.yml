name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Validate required Cloudflare configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secret or variable: ${missing[*]}" >&2
            echo "Set CLOUDFLARE_API_TOKEN as a secret and CLOUDFLARE_ACCOUNT_ID as a secret or variable." >&2
            exit 1
          fi
      - name: Validate Cloudflare token
        shell: bash
        run: |
          set -euo pipefail
          if ! npx wrangler whoami; then
            echo "Cloudflare authentication failed. The token usually needs Workers Scripts:Edit, D1:Edit, Vectorize:Edit, and Account:Read on the target account." >&2
            exit 1
          fi
      - name: Ensure D1 database exists
        shell: bash
        run: |
          set -euo pipefail
          db_name="cloudflare-memory-mcp"
          if npx wrangler d1 info "$db_name" --json > /tmp/d1.json 2>/tmp/d1.err; then
            echo "Using existing D1 database: $db_name"
          else
            echo "Creating D1 database: $db_name"
            npx wrangler d1 create "$db_name" --json > /tmp/d1.json
          fi
          db_id="$(node <<'NODE'
          const fs = require('node:fs');
          const data = JSON.parse(fs.readFileSync('/tmp/d1.json', 'utf8'));
          const id = data.uuid || data.database_id || data.id || '';
          if (!id) {
            console.error('Unable to determine D1 database ID from Wrangler output.');
            console.error(JSON.stringify(data, null, 2));
            process.exit(1);
          }
          process.stdout.write(id);
          NODE
          )"
          echo "CLOUDFLARE_D1_DATABASE_ID=$db_id" >> "$GITHUB_ENV"
      - name: Ensure Vectorize index exists
        shell: bash
        run: |
          set -euo pipefail
          index_name="cloudflare-memory-index"
          if npx wrangler vectorize get "$index_name" --json > /tmp/vectorize.json 2>/tmp/vectorize.err; then
            echo "Using existing Vectorize index: $index_name"
          else
            echo "Creating Vectorize index: $index_name"
            npx wrangler vectorize create "$index_name" --dimensions=768 --metric=cosine --json > /tmp/vectorize.json
          fi
      - name: Inject D1 database ID into wrangler.jsonc
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'wrangler.jsonc';
          const dbId = process.env.CLOUDFLARE_D1_DATABASE_ID;
          const current = fs.readFileSync(path, 'utf8');
          const next = current.replace(
            /"database_id":\s*"[^"]+"/,
            `"database_id": "${dbId}"`,
          );
          if (current === next) {
            throw new Error('Could not find d1_databases[0].database_id in wrangler.jsonc');
          }
          fs.writeFileSync(path, next);
          NODE
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply cloudflare-memory-mcp --remote
      - name: Deploy to Cloudflare
        run: npx wrangler deploy
